name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '*.md'
      - 'dictionary.txt'
      - '.remarkrc.js'
      - '.remarkignore'
      - '.textlintrc'
      - '.vale.ini'
      - '.markdown-lint.yml'
      - '.markdownlint-cli2.cjs'
      - 'script/cibuild-content'
      - 'script/remark'
      - 'script/lint-text'
      - 'script/vale'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - 'package*.json'
      - 'astro.config.mjs'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'assets/**'
      - 'js/**'
      - 'script/**'
      - 'eslint.config.js'
      - '.yamllint.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - '*.md'
      - 'dictionary.txt'
      - '.remarkrc.js'
      - '.remarkignore'
      - '.textlintrc'
      - '.vale.ini'
      - '.markdown-lint.yml'
      - '.markdownlint-cli2.cjs'
      - 'script/cibuild-content'
      - 'script/remark'
      - 'script/lint-text'
      - 'script/vale'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - 'package*.json'
      - 'astro.config.mjs'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'assets/**'
      - 'js/**'
      - 'script/**'
      - 'eslint.config.js'
      - '.yamllint.yml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  statuses: write

env:
  NODE_VERSION: 24

jobs:
  content:
    name: Content Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Install Harper
        env:
          HARPER_VERSION: v1.9.0
        run: |
          curl -fSL "https://github.com/Automattic/harper/releases/download/${HARPER_VERSION}/harper-cli-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv harper-cli /usr/local/bin/

      - name: Install Vale
        env:
          VALE_VERSION: 3.14.2
        run: |
          curl -fSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" | tar xz vale
          sudo mv vale /usr/local/bin/

      - name: Cache Vale styles
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .github/styles
          key: vale-styles-${{ hashFiles('.vale.ini', '.github/styles/AIPatterns/*.yml') }}

      - name: Sync Vale packages
        run: vale sync

      - name: script/cibuild-content
        run: script/cibuild-content

  code:
    name: Code Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint-js

      - name: Lint JSON
        run: npm run lint-json

      - name: Lint YAML
        run: npm run lint-yaml

  check:
    name: Run Astro Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Astro Check
        run: npm run check

  vitest:
    name: Run Vitest Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests with coverage
        run: npm run test:vitest:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 14

  languagetool:
    name: LanguageTool Grammar
    runs-on: ubuntu-latest
    services:
      languagetool:
        image: erikvl87/languagetool
        ports:
          - 8010:8010
        env:
          Java_Xms: 512m
          Java_Xmx: 1g
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Wait for LanguageTool to start
        run: |
          for i in $(seq 1 30); do
            if curl -sS -f http://localhost:8010/v2/languages > /dev/null 2>&1; then
              echo "LanguageTool is ready"
              exit 0
            fi
            echo "Waiting for LanguageTool... ($i/30)"
            sleep 2
          done
          echo "LanguageTool failed to start"
          exit 1

      - name: Run LanguageTool
        env:
          LANGUAGETOOL_URL: http://localhost:8010
        run: script/languagetool
