name: Sync new posts to standard.site

# Runs after a successful deploy and upserts a site.standard.document record on
# the author's PDS for each newly added post. Record keys are derived
# deterministically from the post (see src/utils/standard-site.ts), so the link
# tag the site renders already points at the synced record — no commit-back, and
# re-runs are idempotent.

on:
  workflow_run:
    workflows: ["Deploy site to Cloudflare Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview the record without writing to the PDS'
        type: boolean
        default: true
      post_path:
        description: 'Path to a specific post file to sync (e.g., src/content/posts/2026-06-15-my-post.md)'
        type: string
        required: false

permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect new posts
        id: detect
        run: |
          # Manual dispatch with a specific post path
          if [ -n "${{ inputs.post_path }}" ]; then
            if [ -f "${{ inputs.post_path }}" ]; then
              echo "${{ inputs.post_path }}" > /tmp/new-posts.txt
              echo "has_posts=true" >> "$GITHUB_OUTPUT"
              echo "Manual dispatch for: ${{ inputs.post_path }}"
              exit 0
            else
              echo "❌ File not found: ${{ inputs.post_path }}"
              exit 1
            fi
          fi

          # Manual dispatch without a path: nothing to do
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "No post_path provided for manual dispatch"
            echo "has_posts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-detect from the triggering deploy's commit range
          BEFORE="${{ github.event.workflow_run.head_commit.id }}~1"
          AFTER="${{ github.event.workflow_run.head_commit.id }}"

          NEW_POSTS=$(git diff --name-only --diff-filter=A "$BEFORE" "$AFTER" -- 'src/content/posts/' 2>/dev/null || echo "")

          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts detected"
            echo "has_posts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New posts detected:"
          echo "$NEW_POSTS"
          echo "has_posts=true" >> "$GITHUB_OUTPUT"
          echo "$NEW_POSTS" > /tmp/new-posts.txt

      - name: Setup Node
        if: steps.detect.outputs.has_posts == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.has_posts == 'true'
        run: npm ci

      - name: Sync documents
        if: steps.detect.outputs.has_posts == 'true'
        env:
          ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}
          ATPROTO_HANDLE: ben.balter.com
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          xargs npx tsx script/standard-site/sync-document.ts $DRY_RUN_FLAG < /tmp/new-posts.txt
