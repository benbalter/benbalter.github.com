name: Deploy site to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "deploy"
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # astro-pdf renders /resume to /resume.pdf at build time via Chromium.
      # It auto-installs Chrome for Testing into node_modules/.astro/chrome if
      # none is found; cache that (stable key, so it survives content changes)
      # to avoid re-downloading ~150MB each deploy. Runs after `npm ci`, which
      # would otherwise wipe node_modules.
      - name: Cache astro-pdf Chromium
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: node_modules/.astro/chrome
          key: astro-pdf-chrome-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            astro-pdf-chrome-${{ runner.os }}-

      - name: Cache Astro build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: node_modules/.astro
          # The pipeline fingerprint (remark/rehype plugins, their config wiring, and
          # deps) is a distinct key segment AND the restore-keys prefix. Astro caches
          # rendered markdown per content-file digest and reuses it for unchanged files
          # regardless of plugin code, so a broad `astro-cache-<os>-` restore-key would
          # resurrect HTML built by an old pipeline (e.g. retired /q/<id> quote links)
          # and deploy it. Folding the pipeline hash into the prefix busts the cache when
          # rendering changes, while still reusing it across content-only edits.
          key: astro-cache-${{ runner.os }}-${{ hashFiles('src/lib/**', 'astro.config.mjs', 'src/content.config.ts', 'package-lock.json') }}-${{ hashFiles('src/**/*', 'public/**/*', 'tsconfig.astro.json') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-${{ hashFiles('src/lib/**', 'astro.config.mjs', 'src/content.config.ts', 'package-lock.json') }}-

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
